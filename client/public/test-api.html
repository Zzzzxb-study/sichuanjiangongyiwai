<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API测试 - 业务分类</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .test-btn {
      padding: 10px 20px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .test-btn:hover {
      background: #40a9ff;
    }
    .result {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
    }
    .success {
      color: #52c41a;
    }
    .error {
      color: #ff4d4f;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #d9d9d9;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #fafafa;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>业务分类API测试</h1>
  <button class="test-btn" onclick="testAPI()">测试获取业务分类</button>

  <div id="result" class="result" style="display: none;"></div>

  <script>
    async function testAPI() {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<p>正在测试API...</p>';

      try {
        const response = await fetch('http://localhost:58080/api/config/business-classifications');

        console.log('Response status:', response.status);
        console.log('Response headers:', response.headers);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        console.log('API返回数据:', data);

        if (data.success && data.data) {
          const classifications = data.data;

          let html = '<p class="success">✅ API调用成功！找到 ' + classifications.length + ' 条业务分类</p>';

          html += '<table>';
          html += '<thead><tr><th>ID</th><th>分类名称</th><th>分类等级</th><th>描述</th><th>风险等级</th><th>业务类型数量</th></tr></thead>';
          html += '<tbody>';

          classifications.forEach(item => {
            const riskLevels = typeof item.risk_levels === 'string'
              ? JSON.parse(item.risk_levels)
              : item.risk_levels;
            const businessTypes = typeof item.business_types === 'string'
              ? JSON.parse(item.business_types)
              : item.business_types;

            html += '<tr>';
            html += '<td>' + item.id + '</td>';
            html += '<td>' + item.category_name + '</td>';
            html += '<td>' + item.category_level + '</td>';
            html += '<td>' + item.category_description + '</td>';
            html += '<td>' + riskLevels.join(', ') + '</td>';
            html += '<td>' + businessTypes.length + ' 种</td>';
            html += '</tr>';
          });

          html += '</tbody></table>';
          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = '<p class="error">❌ API返回格式错误</p>';
        }
      } catch (error) {
        console.error('API调用失败:', error);
        resultDiv.innerHTML = '<p class="error">❌ API调用失败: ' + error.message + '</p>';
      }
    }

    // 页面加载时自动测试
    window.addEventListener('load', () => {
      console.log('页面已加载，API地址: http://localhost:58080/api/config/business-classifications');
      setTimeout(testAPI, 500);
    });
  </script>
</body>
</html>
